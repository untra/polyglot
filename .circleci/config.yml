version: 2.1
orbs:
  ruby: circleci/ruby@1.0
  codecov: codecov/codecov@5.3.0

jobs:
  lint:
    docker:
      - image: cimg/ruby:3.2
    steps:
      - checkout
      - ruby/install-deps
      - run:
          name: RuboCop
          command: bundle exec rubocop --format progress

  test:
    docker:
      - image: cimg/ruby:3.2
    environment:
      CI: 'true'
      CODECOV_TOKEN: ${CODECOV_TOKEN}
    steps:
      - checkout
      - ruby/install-deps
      - run:
          name: Run tests and generate coverage
          command: ./test.sh
      - store_test_results:
          path: rspec.xml
      - store_artifacts:
          path: coverage
          destination: coverage

  htmlproofer:
    docker:
      - image: cimg/ruby:3.2
    steps:
      - checkout
      - ruby/install-deps
      - run:
          name: Build example site and run html-proofer
          command: bundle exec rake htmlproofer
      - store_artifacts:
          path: site/_site
          destination: site

workflows:
  version: 2
  build_and_test:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - htmlproofer:
          requires:
            - lint
